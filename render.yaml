databases:
  - name: orbit-postgres
    databaseName: orbit_control
    plan: free

services:
  - type: web
    name: orbit-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    autoDeploy: true
    envVars:
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
      - key: AUTO_MIGRATE
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: orbit-postgres
          property: connectionString
      - key: CORS_ORIGIN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: WORKER_TOKEN
        sync: false
      - key: MCP_SHARED_SECRET
        sync: false

  - type: worker
    name: orbit-playwright-worker
    runtime: docker
    dockerfilePath: ./workers/playwright/Dockerfile
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: orbit-postgres
          property: connectionString
      - key: API_INTERNAL_URL
        sync: false
      - key: WORKER_TOKEN
        sync: false

  - type: web
    name: orbit-web
    runtime: docker
    dockerfilePath: ./apps/web/Dockerfile
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_APP_NAME
        value: Orbit Control
      - key: API_PUBLIC_URL
        sync: false
      - key: NEXT_PUBLIC_API_URL
        sync: false
